<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clawclaw debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    header span { font-size: 12px; color: #666; }
    header .spacer { flex: 1; }
    #settings-btn {
      background: none;
      border: 1px solid #333;
      border-radius: 6px;
      color: #888;
      cursor: pointer;
      font-size: 12px;
      padding: 4px 10px;
      transition: border-color .15s, color .15s;
    }
    #settings-btn:hover { border-color: #555; color: #ccc; }

    #settings-panel {
      display: none;
      border-bottom: 1px solid #222;
      padding: 16px 20px;
      background: #111;
      gap: 12px;
      flex-wrap: wrap;
    }
    #settings-panel.open { display: flex; }
    .setting-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 200px;
      flex: 1;
    }
    .setting-field label { font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: .05em; }
    .setting-field input {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
    }
    .setting-field input:focus { border-color: #555; }
    .setting-field input::placeholder { color: #444; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: #1a6cf5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: #1e1e1e;
      color: #e8e8e8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.assistant.streaming::after {
      content: "▌";
      animation: blink .7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .tool-event {
      align-self: flex-start;
      font-size: 12px;
      color: #888;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      max-width: 85%;
    }
    .tool-event .label {
      color: #f5a623;
      margin-right: 6px;
    }
    .tool-event.result .label { color: #7ed321; }
    .tool-event.error .label { color: #e74c3c; }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
    }
    #input:focus { border-color: #555; }
    #input::placeholder { color: #444; }

    #send {
      background: #1a6cf5;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 0 18px;
      transition: background .15s;
      white-space: nowrap;
    }
    #send:hover { background: #1558cc; }
    #send:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>clawclaw</h1>
    <span>debug console</span>
    <div class="spacer"></div>
    <button id="settings-btn">⚙ 设置</button>
  </header>

  <div id="settings-panel">
    <div class="setting-field">
      <label>API Key</label>
      <input id="cfg-api-key" type="password" placeholder="sk-ant-..." />
    </div>
    <div class="setting-field">
      <label>Base URL</label>
      <input id="cfg-base-url" type="text" placeholder="https://api.anthropic.com" />
    </div>
    <div class="setting-field">
      <label>HTTPS Proxy</label>
      <input id="cfg-proxy" type="text" placeholder="http://127.0.0.1:7890" />
    </div>
    <div class="setting-field">
      <label>Model</label>
      <input id="cfg-model" type="text" placeholder="claude-opus-4-6" />
    </div>
  </div>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="发送消息..."></textarea>
    <button id="send">发送</button>
  </div>

  <script>
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    const cfgApiKey = document.getElementById('cfg-api-key');
    const cfgBaseUrl = document.getElementById('cfg-base-url');
    const cfgProxy = document.getElementById('cfg-proxy');
    const cfgModel = document.getElementById('cfg-model');

    // Load persisted settings
    const STORAGE_KEY = 'clawclaw_config';
    function loadSettings() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) ?? '{}');
        cfgApiKey.value = saved.apiKey ?? '';
        cfgBaseUrl.value = saved.baseURL ?? '';
        cfgProxy.value = saved.httpsProxy ?? '';
        cfgModel.value = saved.model ?? '';
      } catch { /* ignore */ }
    }
    function saveSettings() {
      const cfg = {};
      if (cfgApiKey.value) cfg.apiKey = cfgApiKey.value;
      if (cfgBaseUrl.value) cfg.baseURL = cfgBaseUrl.value;
      if (cfgProxy.value) cfg.httpsProxy = cfgProxy.value;
      if (cfgModel.value) cfg.model = cfgModel.value;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(cfg));
    }
    function getClawConfig() {
      const cfg = {};
      if (cfgApiKey.value) cfg.apiKey = cfgApiKey.value;
      if (cfgBaseUrl.value) cfg.baseURL = cfgBaseUrl.value;
      if (cfgProxy.value) cfg.httpsProxy = cfgProxy.value;
      if (cfgModel.value) cfg.model = cfgModel.value;
      return Object.keys(cfg).length > 0 ? cfg : null;
    }

    loadSettings();
    [cfgApiKey, cfgBaseUrl, cfgProxy, cfgModel].forEach(el => el.addEventListener('input', saveSettings));

    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
    });

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addBubble(role, text) {
      const el = document.createElement('div');
      el.className = `bubble ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addToolEvent(type, data) {
      const el = document.createElement('div');
      el.className = `tool-event ${type === 'tool_result' ? 'result' : type === 'error' ? 'error' : ''}`;

      const label = document.createElement('span');
      label.className = 'label';

      if (type === 'tool_call') {
        label.textContent = '⚙ tool_call';
        el.appendChild(label);
        el.appendChild(document.createTextNode(` ${data.toolName}(${JSON.stringify(data.input)})`));
      } else if (type === 'tool_result') {
        label.textContent = '✓ tool_result';
        el.appendChild(label);
        const out = data.result?.output ?? data.result?.error ?? '';
        el.appendChild(document.createTextNode(` ${data.toolName}: ${out}`));
      } else if (type === 'error') {
        label.textContent = '✕ error';
        el.appendChild(label);
        el.appendChild(document.createTextNode(` ${data.message}`));
      }

      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addBubble('user', text);

      let assistantBubble = null;

      const es = new EventSource('/api/chat?' + new URLSearchParams({ message: text }));

      // EventSource only supports GET; use fetch + ReadableStream for POST SSE
      es.close();

      const clawConfig = getClawConfig();
      const headers = { 'Content-Type': 'application/json' };
      if (clawConfig) headers['X-Claw-Config'] = JSON.stringify(clawConfig);

      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers,
        body: JSON.stringify({ message: text }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const parts = buf.split('\n\n');
        buf = parts.pop() ?? '';

        for (const part of parts) {
          const eventMatch = part.match(/^event: (\w+)/m);
          const dataMatch = part.match(/^data: (.+)/ms);
          if (!eventMatch || !dataMatch) continue;

          const event = eventMatch[1];
          let data;
          try { data = JSON.parse(dataMatch[1]); } catch { continue; }

          if (event === 'message') {
            if (!assistantBubble) {
              assistantBubble = addBubble('assistant', '');
              assistantBubble.classList.add('streaming');
            }
            assistantBubble.textContent += data.content;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (event === 'tool_call' || event === 'tool_result' || event === 'error') {
            addToolEvent(event, data);
          } else if (event === 'done') {
            if (assistantBubble) assistantBubble.classList.remove('streaming');
          }
        }
      }

      if (assistantBubble) assistantBubble.classList.remove('streaming');
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', () => void send());

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        void send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
