<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>clawclaw debug</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f0f0f;
      color: #e8e8e8;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    header h1 { font-size: 15px; font-weight: 600; color: #fff; }
    header span { font-size: 12px; color: #666; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 72%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.user {
      background: #1a6cf5;
      color: #fff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      background: #1e1e1e;
      color: #e8e8e8;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .bubble.assistant.streaming::after {
      content: "▌";
      animation: blink .7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .tool-event {
      align-self: flex-start;
      font-size: 12px;
      color: #888;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 6px 12px;
      font-family: "SF Mono", "Fira Code", monospace;
      max-width: 85%;
    }
    .tool-event .label {
      color: #f5a623;
      margin-right: 6px;
    }
    .tool-event.result .label { color: #7ed321; }
    .tool-event.error .label { color: #e74c3c; }

    #input-area {
      padding: 16px 20px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
    }

    #input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #e8e8e8;
      font-size: 14px;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.5;
      max-height: 120px;
    }
    #input:focus { border-color: #555; }
    #input::placeholder { color: #444; }

    #send {
      background: #1a6cf5;
      border: none;
      border-radius: 8px;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      padding: 0 18px;
      transition: background .15s;
      white-space: nowrap;
    }
    #send:hover { background: #1558cc; }
    #send:disabled { background: #333; color: #666; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>clawclaw</h1>
    <span>debug console</span>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <textarea id="input" rows="1" placeholder="发送消息..."></textarea>
    <button id="send">发送</button>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');

    function addBubble(role, text) {
      const el = document.createElement('div');
      el.className = `bubble ${role}`;
      el.textContent = text;
      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return el;
    }

    function addToolEvent(type, data) {
      const el = document.createElement('div');
      el.className = `tool-event ${type === 'tool_result' ? 'result' : type === 'error' ? 'error' : ''}`;

      const label = document.createElement('span');
      label.className = 'label';

      if (type === 'tool_call') {
        label.textContent = '⚙ tool_call';
        el.appendChild(label);
        el.appendChild(document.createTextNode(` ${data.toolName}(${JSON.stringify(data.input)})`));
      } else if (type === 'tool_result') {
        label.textContent = '✓ tool_result';
        el.appendChild(label);
        const out = data.result?.output ?? data.result?.error ?? '';
        el.appendChild(document.createTextNode(` ${data.toolName}: ${out}`));
      } else if (type === 'error') {
        label.textContent = '✕ error';
        el.appendChild(label);
        el.appendChild(document.createTextNode(` ${data.message}`));
      }

      messagesEl.appendChild(el);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      sendBtn.disabled = true;

      addBubble('user', text);

      let assistantBubble = null;

      const es = new EventSource('/api/chat?' + new URLSearchParams({ message: text }));

      // EventSource only supports GET; use fetch + ReadableStream for POST SSE
      es.close();

      const resp = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const parts = buf.split('\n\n');
        buf = parts.pop() ?? '';

        for (const part of parts) {
          const eventMatch = part.match(/^event: (\w+)/m);
          const dataMatch = part.match(/^data: (.+)/ms);
          if (!eventMatch || !dataMatch) continue;

          const event = eventMatch[1];
          let data;
          try { data = JSON.parse(dataMatch[1]); } catch { continue; }

          if (event === 'message') {
            if (!assistantBubble) {
              assistantBubble = addBubble('assistant', '');
              assistantBubble.classList.add('streaming');
            }
            assistantBubble.textContent += data.content;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } else if (event === 'tool_call' || event === 'tool_result' || event === 'error') {
            addToolEvent(event, data);
          } else if (event === 'done') {
            if (assistantBubble) assistantBubble.classList.remove('streaming');
          }
        }
      }

      if (assistantBubble) assistantBubble.classList.remove('streaming');
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', () => void send());

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        void send();
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
    });
  </script>
</body>
</html>
