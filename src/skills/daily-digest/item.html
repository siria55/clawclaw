<article class="item">
  <span class="num">{{INDEX}}</span>
  <div class="body">
    <a class="title" href="{{URL}}">{{TITLE}}</a>
    {{SUMMARY_BLOCK}}
    <div class="meta-row">
      <span class="source">{{SOURCE}}</span>
      <span class="link-mark">{{CATEGORY_LABEL}}</span>
    </div>
  </div>
</article>
